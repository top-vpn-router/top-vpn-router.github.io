<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0b1424"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="rtr" x1="6" y1="18" x2="26" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <rect x="0.6" y="0.6" width="30.8" height="30.8" rx="5.4" fill="none" stroke="#0ea5e9" stroke-opacity=".35"/>

  <!-- Wi-Fi signal waves (outer) -->
  <path d="M7 11.5 Q16 4.5 25 11.5" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" opacity=".85"/>
  <path d="M10 13.5 Q16 8.5 22 13.5" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="16" cy="15.3" r="1.3" fill="#f59e0b"/>

  <!-- Router body -->
  <rect x="5" y="18" width="22" height="9.5" rx="1.4" fill="url(#rtr)"/>
  <rect x="5" y="18" width="22" height="9.5" rx="1.4" fill="none" stroke="rgba(255,255,255,0.22)"/>

  <!-- LED indicators (ports) -->
  <rect x="7.2" y="20.5" width="1.5" height="1.5" fill="#0b1424" rx=".3"/>
  <rect x="9.5" y="20.5" width="1.5" height="1.5" fill="#0b1424" rx=".3"/>
  <rect x="11.8" y="20.5" width="1.5" height="1.5" fill="#0b1424" rx=".3"/>
  <rect x="14.1" y="20.5" width="1.5" height="1.5" fill="#0b1424" rx=".3"/>

  <!-- Active link LED (glowing) -->
  <circle cx="23.2" cy="21.3" r=".9" fill="#84cc16"/>
  <circle cx="23.2" cy="21.3" r="1.6" fill="#84cc16" opacity=".25"/>

  <!-- Shield VPN lock on router -->
  <path d="M19 23.3 L22.2 24.4 L22.2 25.8 C22.2 26.7 21.1 27.2 20.6 27.3 C20.1 27.2 19 26.7 19 25.8 L19 24.4 L19 23.3 Z" fill="#ffffff"/>
  <path d="M19.9 25.4 L20.4 25.9 L21.3 24.9" fill="none" stroke="#0284c7" stroke-width=".7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
